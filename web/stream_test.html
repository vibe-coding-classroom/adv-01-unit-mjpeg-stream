<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 MJPEG Stream Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 1.5rem; color: #4CAF50; }
        .stream-container {
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            margin-bottom: 1.5rem;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .status {
            font-size: 0.9rem;
            color: #888;
        }
        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            margin-bottom: 1rem;
        }
        button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MJPEG Stream Lab</h1>
        <div class="ip-input">
            <input type="text" id="esp-ip" placeholder="ESP32 IP Address" value="192.168.1.100">
            <button onclick="updateStream()">Connect</button>
        </div>
        <div class="stream-container">
            <img id="mjpeg-stream" src="" alt="Stream not started">
        </div>
        <div class="status">
            Target: <span id="current-url">None</span>
        </div>
    </div>

    <script>
        function updateStream() {
            const ip = document.getElementById('esp-ip').value;
            const url = `http://${ip}/stream`;
            document.getElementById('mjpeg-stream').src = url;
            document.getElementById('current-url').innerText = url;
        }
    </script>
</body>
</html>
